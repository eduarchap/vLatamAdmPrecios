[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback: todas las rutas sirven index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Evita que el navegador cachee el config por cliente
[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
